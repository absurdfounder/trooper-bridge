name: Trigger Snapshot Rebuild

# Manual cross-repo trigger: fire a `repository_dispatch` event at trooper so
# the snapshot pipeline picks up the requested bridge SHA only when needed.
#
# Phase 3 / Workstream 1 of CRABBOX_FLEET_AUTOMATION_PLAN.
#
# Required secret in this repo:
#   CRABSHQ_DISPATCH_TOKEN — fine-grained PAT with actions:write on
#   absurdfounder/Trooper. Pattern mirrors the existing
#   OPENCLAWBRIDGE_DISPATCH_TOKEN flow on the trooper side.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why a manual snapshot trigger?'
        required: false
        default: 'manual'

concurrency:
  group: trigger-snapshot
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          if [ -n "${{ github.sha }}" ]; then
            SHA="${{ github.sha }}"
          else
            echo "::error::Could not resolve source commit SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Dispatching with bridge SHA $SHA"

      - name: Fire repository_dispatch on trooper
        env:
          RAW_GH_TOKEN: ${{ secrets.CRABSHQ_DISPATCH_TOKEN }}
          BRIDGE_SHA: ${{ steps.sha.outputs.sha }}
          TRIGGER_EVENT: ${{ github.event_name }}
        run: |
          GH_TOKEN="$(printf '%s' "${RAW_GH_TOKEN:-}" | tr -d '\r\n[:space:]')"
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::CRABSHQ_DISPATCH_TOKEN not set — skipping dispatch"
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/absurdfounder/Trooper/dispatches \
            -d "$(jq -nc --arg sha "$BRIDGE_SHA" --arg trigger "$TRIGGER_EVENT" '{
              event_type: "snapshot-rebuild",
              client_payload: {
                openclaw_bridge_sha: $sha,
                auto_promote: true,
                triggered_by: $trigger,
                source_repo: "trooper-core"
              }
            }')"
          echo "Dispatched snapshot-rebuild for bridge SHA $BRIDGE_SHA"
