name: Publish Org Runtime Bundle

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trooper-server-updated]
  push:
    branches: [main]
    paths:
      - '.github/workflows/runtime-bundle.yml'
      - 'scripts/publish-org-runtime.sh'

jobs:
  publish-runtime-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      Trooper_REPO: absurdfounder/Trooper
      Trooper_REF: main
      RELEASE_TAG: org-runtime-latest
      ASSET_NAME: trooper-org-runtime.tar.gz
    steps:
      - name: Checkout openclawbridge
        uses: actions/checkout@v4

      - name: Download Trooper server source
        env:
          RAW_CRABSHQ_READ_TOKEN: ${{ secrets.CRABSHQ_READ_TOKEN }}
          RAW_CRABSHQ_DISPATCH_TOKEN: ${{ secrets.CRABSHQ_DISPATCH_TOKEN }}
        run: |
          try_token() {
            local name="$1"
            local raw="$2"
            local token
            token="$(printf '%s' "${raw:-}" | tr -d '\r\n[:space:]')"
            if [ -z "$token" ]; then
              return 1
            fi
            echo "::add-mask::$token"
            if curl -fsSL \
              -H "Authorization: Bearer $token" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${Trooper_REPO}" >/dev/null; then
              GH_TOKEN="$token"
              TOKEN_SOURCE="$name"
              return 0
            fi
            echo "::warning::${name} cannot read ${Trooper_REPO}; trying next token if available"
            return 1
          }

          GH_TOKEN=''
          TOKEN_SOURCE=''
          if ! try_token "CRABSHQ_READ_TOKEN" "${RAW_CRABSHQ_READ_TOKEN:-}" && \
             ! try_token "CRABSHQ_DISPATCH_TOKEN" "${RAW_CRABSHQ_DISPATCH_TOKEN:-}"; then
            echo "::error::No configured Trooper token can read ${Trooper_REPO}. Give CRABSHQ_DISPATCH_TOKEN or CRABSHQ_READ_TOKEN Contents: Read access to the private repo."
            exit 1
          fi

          mkdir -p "${GITHUB_WORKSPACE}/Trooper"
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o "${RUNNER_TEMP}/trooper.tar.gz" \
            "https://api.github.com/repos/${Trooper_REPO}/tarball/${Trooper_REF}"
          tar -xzf "${RUNNER_TEMP}/trooper.tar.gz" -C "${GITHUB_WORKSPACE}/Trooper" --strip-components=1
          test -f "${GITHUB_WORKSPACE}/Trooper/server/package.json"
          echo "Downloaded ${Trooper_REPO}@${Trooper_REF} using ${TOKEN_SOURCE}"

      - name: Build runtime tarball
        run: |
          chmod +x scripts/publish-org-runtime.sh
          ./scripts/publish-org-runtime.sh build \
            "${GITHUB_WORKSPACE}/Trooper/server" \
            "${RUNNER_TEMP}/${ASSET_NAME}"

      - name: Publish release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "Public Trooper org runtime bundle for fresh provisioning."

          gh release upload "${RELEASE_TAG}" "${RUNNER_TEMP}/${ASSET_NAME}" --clobber
