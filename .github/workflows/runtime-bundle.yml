name: Publish Org Runtime Bundle

on:
  workflow_dispatch:
  repository_dispatch:
    types: [crabhq-server-updated]
  push:
    branches: [main]
    paths:
      - '.github/workflows/runtime-bundle.yml'
      - 'scripts/publish-org-runtime.sh'

jobs:
  publish-runtime-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CRABSHQ_REPO: absurdfounder/Crabs-HQ
      CRABSHQ_REF: main
      RELEASE_TAG: org-runtime-latest
      ASSET_NAME: crabhq-org-runtime.tar.gz
    steps:
      - name: Checkout openclawbridge
        uses: actions/checkout@v4

      - name: Download Crabs-HQ server source
        env:
          RAW_CRABSHQ_READ_TOKEN: ${{ secrets.CRABSHQ_READ_TOKEN }}
          RAW_CRABSHQ_DISPATCH_TOKEN: ${{ secrets.CRABSHQ_DISPATCH_TOKEN }}
        run: |
          TOKEN_SOURCE="CRABSHQ_READ_TOKEN"
          RAW_TOKEN="${RAW_CRABSHQ_READ_TOKEN:-}"
          if [ -z "$RAW_TOKEN" ]; then
            TOKEN_SOURCE="CRABSHQ_DISPATCH_TOKEN"
            RAW_TOKEN="${RAW_CRABSHQ_DISPATCH_TOKEN:-}"
          fi

          GH_TOKEN="$(printf '%s' "${RAW_TOKEN:-}" | tr -d '\r\n[:space:]')"
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CRABSHQ_READ_TOKEN or CRABSHQ_DISPATCH_TOKEN is required to read ${CRABSHQ_REPO}"
            exit 1
          fi
          echo "::add-mask::$GH_TOKEN"

          if ! curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${CRABSHQ_REPO}" >/dev/null; then
            echo "::error::${TOKEN_SOURCE} cannot read ${CRABSHQ_REPO}. Give it Contents: Read access to the private repo."
            exit 1
          fi

          mkdir -p "${GITHUB_WORKSPACE}/Crabs-HQ"
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o "${RUNNER_TEMP}/crabhq.tar.gz" \
            "https://api.github.com/repos/${CRABSHQ_REPO}/tarball/${CRABSHQ_REF}"
          tar -xzf "${RUNNER_TEMP}/crabhq.tar.gz" -C "${GITHUB_WORKSPACE}/Crabs-HQ" --strip-components=1
          test -f "${GITHUB_WORKSPACE}/Crabs-HQ/server/package.json"
          echo "Downloaded ${CRABSHQ_REPO}@${CRABSHQ_REF} using ${TOKEN_SOURCE}"

      - name: Build runtime tarball
        run: |
          chmod +x scripts/publish-org-runtime.sh
          ./scripts/publish-org-runtime.sh build \
            "${GITHUB_WORKSPACE}/Crabs-HQ/server" \
            "${RUNNER_TEMP}/${ASSET_NAME}"

      - name: Publish release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "Public CrabsHQ org runtime bundle for fresh provisioning."

          gh release upload "${RELEASE_TAG}" "${RUNNER_TEMP}/${ASSET_NAME}" --clobber
